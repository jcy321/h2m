<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="H2M - HTML to Markdown Converter, a minimalist online tool">
    <title>H2M - HTML to Markdown Converter</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="logo">
                <span class="logo-icon">⟨/⟩</span>
                <span class="logo-text">H2M</span>
            </h1>
            <p class="tagline">HTML → Markdown</p>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Input Section -->
            <section class="input-section">
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" data-mode="html">HTML Input</button>
                    <button class="tab-btn" data-mode="url">URL Fetch</button>
                </div>

                <!-- HTML Mode -->
                <div id="html-mode" class="input-area">
                    <textarea 
                        id="html-input" 
                        class="input-textarea"
                        placeholder="Paste your HTML here..."
                        spellcheck="false"
                    ></textarea>
                </div>

                <!-- URL Mode -->
                <div id="url-mode" class="input-area hidden">
                    <input 
                        type="url" 
                        id="url-input" 
                        class="input-url"
                        placeholder="https://example.com"
                        spellcheck="false"
                    >
                </div>

                <!-- Action Buttons -->
                <div class="actions">
                    <button id="convert-btn" class="btn btn-primary">
                        <span class="btn-icon">↓</span>
                        Convert
                    </button>
                    <button id="fetch-btn" class="btn btn-primary hidden">
                        <span class="btn-icon">↓</span>
                        Fetch & Convert
                    </button>
                    <button id="clear-btn" class="btn btn-secondary">
                        Clear
                    </button>
                </div>

                <!-- Status -->
                <div id="status" class="status"></div>
            </section>

            <!-- Output Section -->
            <section class="output-section">
                <div class="output-header">
                    <span class="output-label">Markdown Output</span>
                    <button id="copy-btn" class="btn btn-small">Copy</button>
                </div>
                <textarea 
                    id="markdown-output" 
                    class="output-textarea"
                    placeholder="Markdown will appear here..."
                    readonly
                ></textarea>
            </section>

            <!-- Examples Section -->
            <section class="examples-section">
                <details>
                    <summary class="examples-toggle">Quick Examples</summary>
                    <div class="examples-grid">
                        <button class="example-btn" onclick="loadExample('<h1>Hello World</h1><p>This is a <strong>test</strong> paragraph.</p>')">
                            Basic HTML
                        </button>
                        <button class="example-btn" onclick="loadExample('<table><thead><tr><th>Name</th><th>Value</th></tr></thead><tbody><tr><td>Test</td><td>123</td></tr></tbody></table>')">
                            Table
                        </button>
                        <button class="example-btn" onclick="loadExample('<ul><li>Item 1</li><li>Item 2</li></ul><ol><li>First</li><li>Second</li></ol>')">
                            Lists
                        </button>
                        <button class="example-btn" onclick="loadExample('<a href=\\'https://example.com\\'>Link</a><img src=\\"image.png\\" alt=\\"Alt text\\">')">
                            Links & Images
                        </button>
                    </div>
                </details>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>
                H2M — Minimalist HTML to Markdown Converter
            </p>
            <p class="keyboard-hint">
                <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to convert
            </p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
